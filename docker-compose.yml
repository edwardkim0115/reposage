services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reposage}
      POSTGRES_USER: ${POSTGRES_USER:-reposage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reposage}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reposage} -d ${POSTGRES_DB:-reposage}"]
      interval: 5s
      timeout: 5s
      retries: 10
 
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - reposage_storage:/app/storage
    command: >
      sh -c "alembic -c apps/api/alembic.ini upgrade head &&
      uvicorn apps.api.app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: .
      dockerfile: workers/indexer/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - reposage_storage:/app/storage
    command: ["python", "workers/indexer/worker.py"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  reposage_storage:

